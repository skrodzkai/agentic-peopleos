name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    name: tests (py ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Compile
        run: >
          python3 -m py_compile
          core/*.py core/tests/*.py tools/*.py
          foundation/data/generate.py
          foundation/compute/engine.py foundation/compute/regression.py foundation/compute/peers.py foundation/compute/rtsr.py foundation/compute/iss_screen.py foundation/compute/retention.py foundation/compute/benchmarking.py foundation/compute/equity_spend.py foundation/compute/glass_lewis_screen.py foundation/compute/merit_comp.py foundation/compute/pvp.py foundation/compute/pay_equity.py foundation/compute/sbc_forecast.py
          foundation/compute/tests/test_engine.py foundation/compute/tests/test_regression.py
          foundation/compute/tests/test_peers.py foundation/compute/tests/test_rtsr.py foundation/compute/tests/test_iss_screen.py foundation/compute/tests/test_retention.py foundation/compute/tests/test_benchmarking.py foundation/compute/tests/test_equity_spend.py foundation/compute/tests/test_glass_lewis_screen.py foundation/compute/tests/test_merit_comp.py foundation/compute/tests/test_pvp.py foundation/compute/tests/test_pay_equity.py foundation/compute/tests/test_sbc_forecast.py
          foundation/render/dashboard.py foundation/render/charts.py
          foundation/render/tests/test_dashboard.py foundation/render/tests/test_charts.py
          examples/headcount-reporting/run.py examples/headcount-reporting/evals/test_headcount.py
          examples/attrition-reporting/run.py examples/attrition-reporting/evals/test_attrition.py
          examples/people-ops-reporting/run.py examples/people-ops-reporting/evals/test_people_ops.py
          examples/operating-review/run.py examples/operating-review/evals/test_operating_review.py
          examples/people-intelligence/run.py examples/people-intelligence/evals/test_people_intelligence.py
          examples/executive-comp-peer-builder/run.py examples/executive-comp-peer-builder/evals/test_peer_builder.py
          examples/executive-comp-benchmarking/run.py examples/executive-comp-benchmarking/evals/test_benchmarking_agent.py
          examples/rtsr-psu-valuation/run.py examples/rtsr-psu-valuation/evals/test_rtsr_psu.py
          examples/iss-pay-screen/run.py examples/iss-pay-screen/evals/test_iss_pay_screen.py
          examples/equity-spend/run.py examples/equity-spend/evals/test_equity_spend_agent.py
          examples/pay-equity/run.py examples/pay-equity/evals/test_pay_equity.py
          examples/sbc-forecasting/run.py examples/sbc-forecasting/evals/test_sbc_forecast_agent.py
          examples/glass-lewis-screen/run.py examples/glass-lewis-screen/evals/test_glass_lewis_agent.py
          examples/pay-versus-performance/run.py examples/pay-versus-performance/evals/test_pvp_agent.py
          examples/merit-comp-planning/run.py examples/merit-comp-planning/evals/test_merit_comp_agent.py
          examples/retention-risk/run.py examples/retention-risk/evals/test_retention_agent.py
          examples/ta-reporting/run.py examples/ta-reporting/evals/test_report.py
          examples/comp-reporting/run.py examples/comp-reporting/evals/test_comp.py
          examples/visible-handoff/run.py examples/visible-handoff/evals/test_handoff.py
          examples/visible-handoff/scenarios.py examples/visible-handoff/render_view.py
          skills/sec-edgar/scripts/edgar.py skills/sec-edgar/scripts/forms.py skills/sec-edgar/scripts/test_skill.py
          skills/sec-comp-research/scripts/peer_screen.py
          skills/sec-proxy-extractor/scripts/extractor.py skills/sec-proxy-extractor/scripts/test_skill.py

      - name: Portable skills — offline self-checks (no network)
        run: |
          python3 skills/sec-edgar/scripts/test_skill.py
          python3 skills/sec-edgar/scripts/forms.py "DEF 14A" >/dev/null
          python3 skills/sec-comp-research/scripts/peer_screen.py --demo >/dev/null
          python3 skills/sec-proxy-extractor/scripts/test_skill.py
          python3 skills/sec-proxy-extractor/scripts/extractor.py --demo >/dev/null

      - name: Public-safety PII scan (ALL committed text, BEFORE generators run)
        run: python3 tools/pii_scan.py .   # whole repo (README/docs/governance/yml/scripts); tests+evals excluded

      - name: Preflight — CI/doc-linked paths exist + nothing required is untracked
        run: python3 tools/preflight.py

      - name: Core spine evals
        run: |
          python3 core/tests/test_evidence.py
          python3 core/tests/test_event_log.py
          python3 core/tests/test_approval_registry.py
          python3 core/tests/test_content.py
          python3 core/tests/test_messaging.py
          python3 core/tests/test_metrics.py

      - name: Data foundation is deterministic + engine reconciles
        run: |
          python3 foundation/data/generate.py
          git diff --exit-code -- foundation/data/acme \
            || (echo "::error::Acme dataset is stale — run foundation/data/generate.py and commit" && exit 1)
          python3 foundation/compute/tests/test_engine.py
          python3 foundation/compute/tests/test_regression.py
          python3 foundation/compute/tests/test_peers.py
          python3 foundation/compute/tests/test_rtsr.py
          python3 foundation/compute/tests/test_iss_screen.py
          python3 foundation/compute/tests/test_retention.py
          python3 foundation/compute/tests/test_benchmarking.py
          python3 foundation/compute/tests/test_equity_spend.py
          python3 foundation/compute/tests/test_glass_lewis_screen.py
          python3 foundation/compute/tests/test_merit_comp.py
          python3 foundation/compute/tests/test_pvp.py
          python3 foundation/compute/tests/test_pay_equity.py
          python3 foundation/compute/tests/test_sbc_forecast.py

      - name: Retention model manifest reproduces (tolerance sync gate — fitted floats aren't byte-diffed)
        run: python3 foundation/compute/retention.py validate   # re-fits + checks coefficients/calibration reproduce within tol (+ panel_data_hash, schema)

      - name: Public-safety ticker scan (whole repo — nothing leaks anywhere)
        run: |
          python3 tools/ticker_scan.py --self-test
          python3 tools/ticker_scan.py .   # whole tree; real tickers allowed ONLY in the allow-listed real-peer arm + skill

      - name: Shared dashboard renderer + chart toolkit evals
        run: |
          python3 foundation/render/tests/test_evidence.py
          python3 foundation/render/tests/test_evidence_portfolio.py
          python3 foundation/render/tests/test_dashboard.py
          python3 foundation/render/tests/test_charts.py

      - name: Metric registry validates
        run: python3 -m core.metrics validate vault/90-people-analytics/metrics/metrics.registry.json

      - name: Glossary is in sync with the registry
        run: |
          python3 tools/render_glossary.py
          git diff --exit-code -- vault/90-people-analytics/metrics vault/90-people-analytics/metrics-glossary.md \
            || (echo "::error::metrics glossary is stale — run tools/render_glossary.py and commit" && exit 1)

      - name: Analytics arm — headcount-reporting eval
        working-directory: examples/headcount-reporting
        run: python3 evals/test_headcount.py

      - name: Analytics arm — attrition / people-ops / operating-review / people-intelligence evals
        run: |
          (cd examples/attrition-reporting && python3 evals/test_attrition.py)
          (cd examples/people-ops-reporting && python3 evals/test_people_ops.py)
          (cd examples/operating-review && python3 evals/test_operating_review.py)
          (cd examples/people-intelligence && python3 evals/test_people_intelligence.py)

      - name: Analytics arm dashboards are in sync with the engine (deterministic)
        run: |
          (cd examples/headcount-reporting && python3 run.py)
          (cd examples/attrition-reporting && python3 run.py)
          (cd examples/people-ops-reporting && python3 run.py)
          (cd examples/operating-review && python3 run.py --publish --approved-by hr.business-partner)
          (cd examples/people-intelligence && python3 run.py)
          git diff --exit-code -- \
            examples/headcount-reporting/output/report.sample.html examples/headcount-reporting/output/day1-digest.sample.md \
            examples/attrition-reporting/output/report.sample.html examples/attrition-reporting/output/day1-digest.sample.md \
            examples/people-ops-reporting/output/report.sample.html examples/people-ops-reporting/output/day1-digest.sample.md \
            examples/operating-review/output/report.sample.html examples/operating-review/output/day1-digest.sample.md \
            examples/operating-review/output/decision.sample.events.jsonl \
            examples/operating-review/output/decision.sample.events.jsonl.anchor.json \
            examples/people-intelligence/output/report.sample.html examples/people-intelligence/output/day1-digest.sample.md \
            || (echo "::error::an Analytics-arm dashboard/ledger is stale — run the agents and commit" && exit 1)

      - name: Executive comp arm — peer-builder eval
        working-directory: examples/executive-comp-peer-builder
        run: |
          python3 evals/test_peer_builder.py
          python3 run.py
          git diff --exit-code -- output/report.sample.html output/day1-digest.sample.md \
            || (echo "::error::executive-comp peer-builder output is stale — run examples/executive-comp-peer-builder/run.py and commit" && exit 1)

      - name: Executive comp arm — benchmarking eval
        working-directory: examples/executive-comp-benchmarking
        run: |
          python3 evals/test_benchmarking_agent.py
          python3 run.py
          python3 ../../tools/verify_evidence.py --verify-sources --verify-rendered \
            output/report.sample.evidence.json output/day1-digest.sample.evidence.json
          git diff --exit-code -- output/report.sample.html output/day1-digest.sample.md \
            output/report.sample.evidence.json output/day1-digest.sample.evidence.json \
            || (echo "::error::executive-comp benchmarking output is stale — run examples/executive-comp-benchmarking/run.py and commit" && exit 1)

      - name: Executive comp arm — rTSR PSU valuation eval
        working-directory: examples/rtsr-psu-valuation
        run: |
          python3 evals/test_rtsr_psu.py
          python3 run.py
          git diff --exit-code -- output/report.sample.html output/day1-digest.sample.md \
            || (echo "::error::rTSR PSU valuation output is stale — run examples/rtsr-psu-valuation/run.py and commit" && exit 1)

      - name: Executive comp arm — ISS pay-for-performance screen eval
        working-directory: examples/iss-pay-screen
        run: |
          python3 evals/test_iss_pay_screen.py
          python3 run.py
          git diff --exit-code -- output/report.sample.html output/day1-digest.sample.md \
            || (echo "::error::ISS pay-for-performance screen output is stale — run examples/iss-pay-screen/run.py and commit" && exit 1)

      - name: Executive comp arm — equity-spend board dashboard eval
        working-directory: examples/equity-spend
        run: |
          python3 evals/test_equity_spend_agent.py
          python3 run.py
          git diff --exit-code -- output/report.sample.html output/day1-digest.sample.md \
            || (echo "::error::equity-spend output is stale — run examples/equity-spend/run.py and commit" && exit 1)

      - name: Executive comp arm — pay-equity / EU Pay Transparency dashboard eval
        working-directory: examples/pay-equity
        run: |
          python3 evals/test_pay_equity.py
          python3 run.py
          git diff --exit-code -- output/report.sample.html output/day1-digest.sample.md \
            || (echo "::error::pay-equity output is stale — run examples/pay-equity/run.py and commit" && exit 1)

      - name: Executive comp arm — SBC expense forecast dashboard eval
        working-directory: examples/sbc-forecasting
        run: |
          python3 evals/test_sbc_forecast_agent.py
          python3 run.py
          python3 ../../tools/verify_evidence.py --verify-sources --verify-rendered \
            output/report.sample.evidence.json output/day1-digest.sample.evidence.json
          git diff --exit-code -- output/report.sample.html output/day1-digest.sample.md \
            output/report.sample.evidence.json output/day1-digest.sample.evidence.json \
            || (echo "::error::sbc-forecasting output is stale — run examples/sbc-forecasting/run.py and commit" && exit 1)

      - name: Executive comp arm — ISS vs Glass Lewis say-on-pay war room eval
        working-directory: examples/glass-lewis-screen
        run: |
          python3 evals/test_glass_lewis_agent.py
          python3 run.py
          git diff --exit-code -- output/report.sample.html output/day1-digest.sample.md \
            || (echo "::error::glass-lewis-screen output is stale — run examples/glass-lewis-screen/run.py and commit" && exit 1)

      - name: Executive comp arm — Pay-versus-Performance (CAP / Item 402(v)) eval
        working-directory: examples/pay-versus-performance
        run: |
          python3 evals/test_pvp_agent.py
          python3 run.py
          git diff --exit-code -- output/report.sample.html output/day1-digest.sample.md \
            || (echo "::error::pay-versus-performance output is stale — run examples/pay-versus-performance/run.py and commit" && exit 1)

      - name: Total Rewards arm — merit / comp-cycle planning dashboard eval
        working-directory: examples/merit-comp-planning
        run: |
          python3 evals/test_merit_comp_agent.py
          python3 run.py
          git diff --exit-code -- output/report.sample.html output/day1-digest.sample.md output/equity_refresh_grants.sample.csv \
            || (echo "::error::merit-comp-planning output is stale — run examples/merit-comp-planning/run.py and commit" && exit 1)

      - name: Retention arm — retention-risk committee dashboard eval
        working-directory: examples/retention-risk
        run: |
          python3 evals/test_retention_agent.py
          python3 run.py
          git diff --exit-code -- output/report.sample.html output/committee-digest.sample.md \
            || (echo "::error::retention-risk output is stale — run examples/retention-risk/run.py and commit" && exit 1)

      - name: Operating-review decision ledger validates (registry + anchor) and rejects truncation
        run: |
          python3 -m core.event_log validate examples/operating-review/output/decision.sample.events.jsonl \
            --registry examples/visible-handoff/approval_registry.json \
            --anchor examples/operating-review/output/decision.sample.events.jsonl.anchor.json
          # negative control: a truncated ledger MUST fail against its committed anchor (drop the last row
          # portably — GNU `head -n -1` differs on BSD, so use sed)
          sed '$d' examples/operating-review/output/decision.sample.events.jsonl > /tmp/or_trunc.jsonl && \
            ! python3 -m core.event_log validate /tmp/or_trunc.jsonl \
              --anchor examples/operating-review/output/decision.sample.events.jsonl.anchor.json \
            || (echo "::error::operating-review truncation defense did not trip" && exit 1)

      - name: TA reporting eval + dashboard in sync
        working-directory: examples/ta-reporting
        run: |
          python3 evals/test_report.py
          python3 run.py
          git diff --exit-code -- output/report.sample.html output/day1-digest.sample.md \
            || (echo "::error::ta-reporting output is stale — run examples/ta-reporting/run.py and commit" && exit 1)

      - name: Comp reporting eval + dashboard in sync
        working-directory: examples/comp-reporting
        run: |
          python3 evals/test_comp.py
          python3 run.py
          git diff --exit-code -- output/report.sample.html output/day1-digest.sample.md \
            || (echo "::error::comp-reporting output is stale — run examples/comp-reporting/run.py and commit" && exit 1)

      - name: Visible-handoff eval
        working-directory: examples/visible-handoff
        run: python3 evals/test_handoff.py

      - name: Ledger validates on replay (approval registry re-verified + head-count anchor)
        run: |
          (cd examples/visible-handoff && python3 run.py)
          python3 -m core.event_log validate examples/visible-handoff/output/events.jsonl \
            --registry examples/visible-handoff/approval_registry.json \
            --anchor examples/visible-handoff/output/events.jsonl.anchor.json

      - name: Both handoff outcomes validate (approved + denied + their anchors)
        run: |
          (cd examples/visible-handoff && python3 scenarios.py)
          python3 -m core.event_log validate examples/visible-handoff/output/denied.events.sample.jsonl \
            --registry examples/visible-handoff/approval_registry.json \
            --anchor examples/visible-handoff/output/denied.events.sample.jsonl.anchor.json

      - name: Committed anchors are in sync (regenerated == committed) and catch truncation
        run: |
          # anchors regenerate byte-identically from run.py/scenarios.py above
          git diff --exit-code -- examples/visible-handoff/output/events.jsonl.anchor.json \
            examples/visible-handoff/output/approved.events.sample.jsonl.anchor.json \
            examples/visible-handoff/output/denied.events.sample.jsonl.anchor.json \
            || (echo "::error::a committed head-count anchor is stale — re-run run.py + scenarios.py and commit" && exit 1)
          # a truncated ledger must FAIL against its committed anchor (the defense actually bites).
          # drop the last row with sed (portable; GNU `head -n -1` is not on BSD/macOS)
          sed '$d' examples/visible-handoff/output/events.jsonl > /tmp/truncated.jsonl
          if python3 -m core.event_log validate /tmp/truncated.jsonl \
               --anchor examples/visible-handoff/output/events.jsonl.anchor.json; then
            echo "::error::truncation defense did not trip — a truncated ledger validated against the anchor" && exit 1
          fi

      - name: Rendered ledger view is in sync with the ledger
        run: |
          (cd examples/visible-handoff && python3 render_view.py)
          git diff --exit-code -- examples/visible-handoff/output/ledger.sample.html \
            || (echo "::error::ledger.sample.html is stale — run examples/visible-handoff/render_view.py and commit" && exit 1)

      - name: Evidence Graph v1 covers every generated dashboard and digest
        run: python3 tools/verify_evidence.py --portfolio --verify-sources --verify-rendered

      - name: Vault lint
        run: python3 tools/vault_lint.py vault

      - name: Public-safety PII scan (committed data/outputs/vault)
        run: |
          python3 tools/pii_scan.py \
            examples/ta-reporting/output examples/ta-reporting/data \
            examples/comp-reporting/output examples/comp-reporting/data \
            examples/rtsr-psu-valuation/output examples/rtsr-psu-valuation/data \
            examples/iss-pay-screen/output \
            examples/equity-spend/output \
            examples/pay-equity/output \
            examples/sbc-forecasting/output \
            examples/glass-lewis-screen/output \
            examples/merit-comp-planning/output \
            examples/executive-comp-benchmarking/output \
            examples/visible-handoff/output foundation/data vault

      - name: No stale or UNTRACKED generated artifacts (whole-tree backstop)
        run: |
          # every generator/renderer above has now run; the tree must be byte-clean. A per-path `git diff`
          # only catches modifications to TRACKED files — this backstop also catches a NEW output file a
          # run.py started emitting that was never committed (which the per-path diffs miss).
          DIRTY="$(git status --porcelain)"
          if [ -n "$DIRTY" ]; then
            echo "::error::working tree is dirty after regeneration — a committed artifact is stale OR a new"
            echo "::error::generated file is untracked. Regenerate + commit (or .gitignore it):"
            echo "$DIRTY"
            exit 1
          fi
