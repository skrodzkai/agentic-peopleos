name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ta-reporting:
    name: ta-reporting example
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12"]
    defaults:
      run:
        working-directory: examples/ta-reporting
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile
        run: python -m py_compile run.py evals/test_report.py
      - name: Run eval (happy path + fail-closed contract + publish gate)
        run: python evals/test_report.py
