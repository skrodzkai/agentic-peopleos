# Tools the headcount-reporting agent is allowed to use.
# Note what's ABSENT: no "send"/"publish" tool, and no write access to any system of record.

tools:
  - name: metric_engine_read
    access: read-only
    description: >
      Reads computed metrics from the shared MetricEngine (foundation/compute/engine.py), which is
      itself read-only over the synthetic data foundation and bound to the metric registry. The agent
      performs no metric math of its own.

  - name: report_writer
    access: write-local
    description: >
      Renders the workforce dashboard (HTML) and the Day-1 digest (Markdown) to the local output/
      directory. Produces drafts only.

# Intentionally NOT granted:
#   - email / Slack / "publish" — a human owns distribution (publish gate)
#   - any write access to the HRIS — this agent only reads computed aggregates
#   - any "decide" capability — the agent reports; humans decide
