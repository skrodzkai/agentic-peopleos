# Tools the compensation reporting agent is allowed to use.
# Note what's deliberately ABSENT: there is no "send"/"publish" tool, and no tool
# that can write pay. Publishing is a human action behind the publish gate, and
# changing pay is a human decision the metric registry forbids the agent (see SPEC.md).

tools:
  - name: comp_snapshot_read
    access: read-only
    description: >
      Reads a point-in-time compensation snapshot from the HRIS / comp system.
      Vendor-agnostic; this example reads data/comp_snapshot.sample.csv instead
      of calling a real system. Swap in your own adapter behind the same interface.

  - name: metric_registry_read
    access: read-only
    description: >
      Reads vault/90-people-analytics/metrics/metrics.registry.json to cite the
      canonical definition of every metric (compa-ratio, range penetration, etc.)
      and to honor each metric's forbidden actions.

  - name: report_writer
    access: write-local
    description: >
      Renders the compensation report (HTML) and the Day-1 digest (Markdown)
      to the local output/ directory. Produces drafts only.

# Intentionally NOT granted:
#   - email / Slack / "publish" — a human owns distribution (publish gate)
#   - any write access to the HRIS or comp system — this agent only reads source data
#   - any "set pay" / "recommend raise" capability — the registry forbids it; pay is a human decision
