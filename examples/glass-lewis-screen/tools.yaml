# Tools the glass-lewis-screen agent is allowed to use.
# Note what's ABSENT: no scoring/grading tool, no vote-forecast model, no pay-recommendation writer,
# no proxy scraper, and no "send"/"publish" tool.

tools:
  - name: two_advisor_read
    access: read-only
    description: >
      Reads the reconciled two-advisor result (the Glass Lewis grade + pay/performance percentiles, the ISS
      concern + measures, and the agree/diverge synthesis with its directional say-on-pay band) from the
      shared engine (foundation/compute/glass_lewis_screen.py), itself read-only over the synthetic universe.
      The agent performs no scoring of its own.

  - name: report_writer
    access: write-local
    description: >
      Renders the war-room dashboard (HTML) and the digest (Markdown) to the local output/ directory.
      Produces drafts only; distribution requires the human publish gate.

# Intentionally NOT granted:
#   - any grade/score/concern-level generator — the agent renders the engine's result, it does not judge pay
#   - any say-on-pay vote-forecast / probability model — the support band is a directional range, never a forecast
#   - pay-recommendation / plan-design writer — no compensation decision, ever
#   - proxy / ISS / Glass Lewis / EDGAR scraper — the advisor models here are illustrative synthetic reconstructions
#   - email / Slack / "publish" — the Compensation Committee owns distribution (publish gate)
